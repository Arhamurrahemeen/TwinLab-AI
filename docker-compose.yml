version: "3.8"

services:

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: twinlab-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: twinlab-influx
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=twinlab123
      - DOCKER_INFLUXDB_INIT_ORG=twinlab
      - DOCKER_INFLUXDB_INIT_BUCKET=twinlab
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=twinlab-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: twinlab-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=twinlab123
      - MONGO_INITDB_DATABASE=twinlab
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  influxdb_data:
  mongo_data:
